# hexa.toml — hexa-matter standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-matter
# Provenance: extracted from canon/domains/materials/ on 2026-05-09
#             (n6-arch SHA 47c70cbf — sister of hexa-energy / hexa-chip).

[package]
name = "hexa-matter"
version = "1.0.0"
entry = "cli/hexa-matter.hexa"
description = "n=6 소재 substrate (HEXA family) — 36-verb materials toolkit (17 v1.0.0 + 12 Phase D + 4 Phase D follow-on + 3 Phase D'' 2026-05-13: elastomer · compound-semi · perovskite · 2d-materials · adhesive · magnetic-materials · mof · liquid-crystal · superalloy · biodegradable-plastics · wood-cellulose · carbon · glass-ceramic · geopolymer · aerogel-foam · ionic-liquid · refractory · photoresist · electrode-material). Spec-first; 작동 .hexa CLI는 spec headline dispatcher. silicon + photoresist은 material layer only; semiconductor device + fab process는 hexa-chip 도메인 (CROSS_LINK §3.2). electrode-material은 active material only; cell engineering은 hexa-energy 도메인 (CROSS_LINK §3.3)."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/dancinlab/hexa-matter"
homepage = "https://github.com/dancinlab/hexa-matter"
readme = "README.md"
keywords = ["materials", "ceramics", "polymer", "glass", "silicon", "concrete", "metallurgy", "recycle", "hexa-family"]
categories = ["material-science", "spec-substrate"]

[[bin]]
name = "hexa-matter"
path = "cli/hexa-matter.hexa"

[test]
runner = "hexa"
files = [
    "tests/test_selftest.hexa",
]

[scripts]
install = "install.hexa"

# ── Verb manifest (36-verb materials substrate, 17 v1.0.0 + 12 Phase D + 4 Phase D follow-on + 3 Phase D'') ──
# silicon joins the ceramic_inorganic group: elemental Si (poly / mono / wafer)
# plus SiO₂ / SiC / SiN / Si₃N₄ cross-links to glass + ceramics. Material layer
# only; semiconductor device + fab process stay in hexa-chip (see [crosslink]).
# Phase D (2026-05-13) added 12 verbs across CER / POL / FIB / MET groups.
# Phase D follow-on (2026-05-13) added 4 more verbs:
#   CER: glass-ceramic, geopolymer, aerogel-foam (silica-network nanoporous)
#   POL: ionic-liquid (room-T molten salts; placed in polymer group as
#        organic/soft-matter extension — distinct from polymers per §1 spec)
# Phase D'' (2026-05-13) added 3 more verbs (33→36):
#   CER: refractory (high-T ≥ 1000 °C service materials — distinct from `ceramics`,
#        which is general advanced ceramics; refractory is the service-envelope
#        discipline)
#   CER: electrode-material (battery cathode/anode + electrocatalyst — material
#        layer only; cell engineering belongs to hexa-energy per CROSS_LINK §3.3)
#   POL: photoresist (lithography photopolymer chemistry — material layer only;
#        lithography process belongs to hexa-chip per CROSS_LINK §3.2)
verb_parent = "."
[verbs]
ceramic_inorganic = ["ceramics", "concrete", "concrete_tech", "glass", "silicon", "compound-semi", "perovskite", "2d-materials", "mof", "carbon", "glass-ceramic", "geopolymer", "aerogel-foam", "refractory", "electrode-material"]
polymer           = ["aramid", "epoxy", "nylon", "pet_film", "tire_cord", "elastomer", "adhesive", "liquid-crystal", "biodegradable-plastics", "ionic-liquid", "photoresist"]
fiber_paper       = ["fabric", "paper", "wood-cellulose"]
gem_mineral       = ["gemology"]
metal             = ["metallurgy", "superalloy", "magnetic-materials"]
synthesis         = ["synthesis"]
recycle           = ["recycle_n6", "recycling"]

# ── Cross-link (sister substrates — invoke their CLIs directly) ──
# Policy: chip-grade semiconductor *device + fab process* lives in hexa-chip.
#         The silicon verb HERE covers the *material* aspect of Si (polysilicon
#         feedstock, mono-Si wafer, SiO₂ / SiC / SiN ceramics, silicone polymer)
#         — purity ceiling, ingot dimension, vendor tonnage. Lithography,
#         transistor architecture, EUV resist, fab capacity → hexa-chip.
[crosslink]
chip = "dancinlab/hexa-chip (semiconductor device + fab process — call `hexa-chip materials` for the device/lithography/EUV-resist stack; silicon AS MATERIAL lives here under silicon/)"

# ── Closure provenance (raw#10 honest C3) ─────────────────
[closure]
verbs_total = 36
groups_total = 7
verbs_wired = 0
verbs_spec = 36
verdict = "SPEC_FIRST"
extracted_from = "canon/domains/materials/ @ 47c70cbf (+ silicon authored 2026-05-13 in-repo, not extracted; + 12 Phase D verbs authored 2026-05-13 in-repo: elastomer, compound-semi, perovskite, 2d-materials, adhesive, magnetic-materials, mof, liquid-crystal, superalloy, biodegradable-plastics, wood-cellulose, carbon; + 4 Phase D follow-on verbs 2026-05-13 in-repo: glass-ceramic, geopolymer, aerogel-foam, ionic-liquid; + 3 Phase D'' verbs 2026-05-13 in-repo: refractory, photoresist, electrode-material)"
parity_gates_total = 29  # Phase H + I.1 + I.2 (2026-05-13) — Category (b) parity gates landed under tests/*_parity.py (10 Phase H + 10 Phase I.1 + 9 Phase I.2; anchored to NIST/CRC/ASM/SEMI/ASTM/TAPPI/AATCC/ISO + vendor datasheets in tests/snapshots/*.json); aggregator = selftest/parity_gates_smoke.sh (29/29 internal). CLOSURE_RESIDUAL_BACKLOG §B drained 29 → 0 — Category (a)+(b) = 100%.
selftest_pass = "38/38"  # Phase K.1 sync 2026-05-14: universal_ff_runner_smoke gate #38 added — validates _python_bridge/universal_ff_runner.py (unified MACE/CHGNet/ALIGNN/SchNet/M3GNet runner; mock-mode --selftest force-SKIPs all 5 optional deps so CI NEVER triggers live compute per raw#10 C3; SIM-NNP status tag added to NOVEL.md §2 distinct from SIM-NNP-PROXY — both SIM tags, neither promotes to EXTERNAL-VERIFIED). Phase J.2 baseline preserved: uff_predictions_smoke gate validates the 17 SIM-NNP-PROXY snapshots (is_measurement: false + is_external_verification: false + n6_lattice_fit_applied: false on each). Phase H + I.1 + I.2 + closure-meta sync remains: cross_link_integrity_audit + c_handoff_completeness_audit; parity_gates_smoke aggregator reports 29/29 internal Cat (b) gates.
category_a_closed = true  # 100% by 2026-05-13 silicon authoring (a239611)
category_b_closed = true  # 100% by 2026-05-13 Phase I.2 (this commit)
category_c_status = "OUT-OF-REPO BY DESIGN"  # wet-lab / vendor / fab handoff per AXIS_CLOSURE_PLAN.md §0
category_c_handoff_audited = true  # 2026-05-13 — selftest/c_handoff_completeness_audit.py (gate #29) confirms every §C row carries a named DEST + LIMIT_BREAKTHROUGH wall classification + raw#10 C3 honest provenance. Software-side handoff documentation = 100%. The (c) execution itself remains OUT-OF-REPO BY DESIGN.

# ── Verify scoreboard (Wave closure, 2026-05-13) ──────────
# All four verify/*.hexa scripts must PASS for the substrate to claim closure.
# Run: `hexa run verify/run_all.hexa` from the repo root (exit 0 = all PASS).
[verify]
scripts_total = 4
scripts_passed = 4
scripts = [
    "verify/spec_presence.hexa",       # 36/36 verb spec docs present at declared paths
    "verify/lattice_arithmetic.hexa",  # n=6 self-consistency (aux per LATTICE_POLICY §1.3)
    "verify/real_limits_anchor.hexa",  # LIMIT_BREAKTHROUGH.md anchors (NIST/CRC/Hales)
    "verify/closure_consistency.hexa", # scoreboard cross-check (CLI · toml · README · AGENTS)
]
aggregator = "verify/run_all.hexa"
verdict = "CLOSED"  # 36/36 verbs spec-present · 4/4 verify scripts PASS
selftest_pass = "38/38"  # Phase B selftest harness + Phase E + F + G + G+1 COD + G+2 OQMD/AFLOW/NOMAD + Phase H + I.1 + I.2 parity gates + closure-meta cross_link_integrity + c_handoff_completeness + Phase J.1 falsifier/hardwall/vendor audits + Phase J.2 uff_predictions_smoke + Phase J.3 nims_mats/catalysis_hub adapters + Phase J.5 novel_verb_xref_audit + Phase K.1 universal_ff_runner_smoke gate #38 (mock-mode runner — MACE/CHGNet/ALIGNN/SchNet/M3GNet SKIP cleanly; SIM-NNP status tag distinct from SIM-NNP-PROXY per NOVEL.md §2) — see selftest/run_all.sh
selftest_aggregator = "selftest/run_all.sh"
python_bridge_modules = 12  # Phase E (2026-05-13) — _python_bridge/module/*.py (12 modules: 6 stdlib FUNCTIONAL + 2 RDKit + 2 ASE + 2 pymatgen; SKIP cleanly when optional deps missing)
python_bridge_aggregator = "selftest/pyproject_smoke.sh"
research_bridge_modules = 8  # Phase F (2026-05-13) — _research_bridge/ (arxiv 2 + web 3 + selftest 3): arxiv_pull · arxiv_digest · vendor_datasheet_pull · materials_news_feed · patent_search · arxiv_smoke · web_smoke · sources_audit; offline-replay only, --live gated, stdlib + optional requests/feedparser/beautifulsoup4
research_bridge_aggregator = "selftest/research_bridge_smoke.sh"
absorption_bridge_modules = 16  # Phase G (2026-05-13) + Phase G+1 (2026-05-13) + Phase G+2 (2026-05-13) + Phase J.3 (2026-05-13) — _absorption_bridge/ (11 external systems + 5 universal FFs): mp_api_smoke · gnome_dataset_smoke · matlantis_call_smoke · omat24_dataset_smoke · cod_search_smoke · oqmd_search_smoke · aflow_search_smoke · nomad_search_smoke · nims_mats_search_smoke (Japan dual-mode) · catalysis_hub_search_smoke (DFT surface-reactions) · schnet_call · mace_call · alignn_call · chgnet_call · m3gnet_call (+ selftest aggregators); offline fixture replay only, NO LIVE API CALLS in selftest, stdlib + optional mp-api/mace-torch/schnetpack/matgl/alignn/chgnet/qmpy_rester/aflow/nomad-lab/catalysis-hub
absorption_bridge_aggregator = "selftest/absorption_bridge_smoke.sh"
parity_gates_total = 10  # Phase H (2026-05-13) — tests/*_parity.py: 10 stdlib-only Category (b) parity gates anchored to NIST/CRC/ASM/TAPPI/GIA vendored snapshots in tests/snapshots/*.json (cer_b2_si_density · cer_b3_si_bandgap · cer_b4_sic_bandgap · cer_b5_si3n4_flexural · pol_b1_aramid_tensile · pol_b4_nylon66_tg_tm · fib_b2_paper_tensile · met_b4_w_melting · met_b5_os_density · gem_b1_corundum_ri); offline only, raw#10 C3 preserved (n6_lattice_fit_applied: false on every snapshot), SPEC_FIRST preserved (gates check spec↔source parity, not measurement)
parity_gates_aggregator = "selftest/parity_gates_smoke.sh"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "36-verb 통합 substrate (7 그룹; 17 v1.0.0 + 12 Phase D + 4 Phase D follow-on + 3 Phase D'' 2026-05-13). spec-first markdown only — 작동 .hexa CLI는 spec headline dispatcher. silicon 추가 (2026-05-13): material layer만 — poly-Si / mono-Si wafer / SiO₂ / SiC / SiN. Phase D verbs (elastomer · compound-semi · perovskite · 2d-materials · adhesive · magnetic-materials · mof · liquid-crystal · superalloy · biodegradable-plastics · wood-cellulose · carbon) + Phase D follow-on (glass-ceramic · geopolymer · aerogel-foam · ionic-liquid) + Phase D'' (refractory · photoresist · electrode-material) — material layer만; device 통합은 hexa-chip / hexa-energy / hexa-mobility / hexa-bio cross-link. photoresist은 lithography process가 아닌 photopolymer chemistry만 (CROSS_LINK §3.2). electrode-material은 active material만, cell engineering은 hexa-energy (CROSS_LINK §3.3)."
not_scope = ["semiconductor device + fab process (→ hexa-chip CLI; silicon + photoresist HERE는 material layer만)", "battery cell engineering (→ hexa-energy; electrode-material HERE는 active material만)", "lutherie / instrument-craft (culture 결)", "fashion-textile / textile-dyeing (industrial-textile 별도 묶음 후보)", "in-situ pilot batch validation"]

# ── Cost profile ──────────────────────────────────────────
[cost]
mac_local_default = "$0 (spec read + CLI dispatcher placeholder)"
selftest = "$0 (verb count check)"
